name: vasundhara
description: A professional tree plantation application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.5
  google_fonts: ^6.1.0
  flutter_animate: ^4.2.0
  cached_network_image: ^3.3.0
  intl: ^0.20.2
  smooth_page_indicator: ^2.0.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  google_sign_in: ^7.2.0
  image_picker: ^1.2.2
  http: ^1.6.0
  geolocator: ^14.0.3
  flutter_map_marker_cluster: ^8.2.2
  url_launcher: ^6.3.2
  location: ^8.0.1
  timeago: ^3.7.1
  fl_chart: ^1.2.0
  share_plus: ^13.1.0
  path_provider: ^2.1.6
  lottie: ^3.4.0
  shared_preferences: ^2.5.5
  geocoding: ^4.0.0
  pdf: ^3.12.0
  printing: ^5.14.3
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#16452B"
  adaptive_icon_foreground: "assets/images/app_icon_padded.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
